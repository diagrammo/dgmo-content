name: Dispatch site deploy

# Ping diagrammo_app_site to rebuild+deploy when examples or guides change —
# its landing page renders straight from examples/<type>/<type>.dgmo.
#
# Needs a repo secret SITE_DEPLOY_PAT: a fine-grained PAT with
# Actions: read+write (or classic `repo` scope) on diagrammo/diagrammo_app_site.
# Without it this no-ops gracefully; the site still catches up on its daily
# scheduled rebuild or a manual `gh workflow run deploy -R diagrammo/diagrammo_app_site`.

on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - 'guide/**'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger diagrammo_app_site deploy
        env:
          TOKEN: ${{ secrets.SITE_DEPLOY_PAT }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::notice::SITE_DEPLOY_PAT not set — site will pick this up on its daily rebuild or a manual dispatch."
            exit 0
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/diagrammo/diagrammo_app_site/dispatches \
            -d '{"event_type":"content-updated"}'
